name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linter-tests:
    runs-on: golang
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Cache Go modules
        uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: govulncheck
        run: govulncheck ./...

      - name: Unit tests
        run: go test ./... -race

      - name: Integration tests
        run: |
          pkgs=$(grep -rl '^//go:build integration$' --include='*_test.go' . | xargs -n1 dirname | sort -u)
          go test -tags=integration -race $pkgs

  docker:
    runs-on: golang
    needs: linter-tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Build and push
        env:
          DOCKER_BUILDKIT: 1
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" \
            | docker login git.sonuserver.com -u fortega21 --password-stdin
          IMAGE=git.sonuserver.com/fortega21/appointment-manager
          docker build -f docker/Dockerfile \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"