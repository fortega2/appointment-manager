services:
  api:
    container_name: appointment-manager-api
    hostname: api
    image: git.sonuserver.com/fortega21/appointment-manager-api:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ENV: production
    networks:
      - caddy_network
    expose:
      - ${API_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: appointment-manager-postgres
    hostname: postgres
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - caddy_network
    expose:
      - ${POSTGRES_PORT:-5432}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: appointment-manager-postgres-data

networks:
  caddy_network:
    external: true
